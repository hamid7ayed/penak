<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="پینک">
    <link rel="manifest" href="manifest.json">
    
    <!-- App Icons for iOS -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    
    <title>پينک - موبایل</title>
    
    <!-- Estedad Font -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/estedad-font@v0.4.1/dist/Estedad-FD.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        body { 
            font-family: 'Estedad FD', 'Vazirmatn', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overscroll-behavior: none;
        }
        
        /* Prevent pull-to-refresh */
        body {
            overscroll-behavior-y: contain;
        }
        
        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* Touch-friendly buttons */
        .touch-btn {
            min-height: 48px;
            min-width: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Active state for touch */
        .touch-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        /* Winner Animation */
        .winner-glow { 
            animation: victoryPulse 2s infinite;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 3px solid #10b981;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
        
        @keyframes victoryPulse { 
            0%, 100% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); } 
            50% { box-shadow: 0 0 50px rgba(16, 185, 129, 0.8); } 
        }
        
        /* Tab Transitions */
        .tab-btn { 
            border-bottom: 3px solid transparent; 
            color: #6b7280; 
            transition: all 0.2s;
            position: relative;
            touch-action: manipulation;
        }
        
        .tab-btn.active { 
            color: #2563eb; 
            font-weight: bold; 
            background: linear-gradient(to bottom, #eff6ff, #ffffff);
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
        }
        
        /* Enhanced Input Focus */
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* Score Animation */
        .score-update {
            animation: scoreChange 0.4s ease-out;
        }
        
        @keyframes scoreChange {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: #fbbf24; }
            100% { transform: scale(1); }
        }
        
        /* Log Container */
        .log-container { 
            max-height: 120px; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.3) transparent;
            -webkit-overflow-scrolling: touch;
        }
        
        .log-item { 
            border-bottom: 1px dashed #e5e7eb; 
            padding: 6px 10px; 
            font-size: 15px;
            transition: background 0.2s;
            animation: fadeInLog 0.3s ease-out;
        }
        
        @keyframes fadeInLog {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Button Effects */
        .btn-primary {
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        /* Card Fade In */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Player Selection */
        .player-option {
            transition: all 0.2s;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .player-option:active {
            transform: scale(0.97);
        }
        
        .player-option.selected {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-color: #1d4ed8;
        }
        
        /* Number Input Styling */
        input[type="number"] {
            -moz-appearance: textfield;
            font-size: 20px;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Quick Score Buttons */
        .quick-score {
            touch-action: manipulation;
            transition: all 0.2s;
        }
        
        .quick-score:active {
            transform: scale(0.92);
        }
        
        /* Slide up animation */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        
        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        
        .bottom-sheet.open {
            transform: translateY(0);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        /* Swipe indicator */
        .swipe-indicator {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin: 12px auto;
        }
    </style>
</head>
<body class="p-0">

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBAgnkl-zYbG9fRPsYUfBWjqMB-tMT8M0PNkg_IsycE9wKnqhv2-59vVazGB5vYfet/exec"; 

        // Player management
        let savedPlayers = [];
        let savedPlaces = [];
        let selectedPlayers = {
            teamA: [],
            teamB: []
        };

        // Game State
        let gameState = {
            active: false,
            date: "", time: "", place: "",
            target: 204,
            teamA: { players: [], score: 0, history: [] },
            teamB: { players: [], score: 0, history: [] },
            winner: null
        };

        // Load saved data on startup
        window.onload = function() {
            loadPlayers();
            loadPlaces();
            renderSavedPlayers();
            loadHistoryToExtractData(); // Load history to populate players and places
            checkSyncStatus(); // Check if there's pending sync
        };

        function checkSyncStatus() {
            const pendingSync = localStorage.getItem('penak_pending_sync');
            if(pendingSync === 'true') {
                document.getElementById('sync-status').classList.remove('hidden');
            }
        }

        function retrySyncNow() {
            showNotification("🔄 در حال تلاش مجدد...", "info");
            
            // Try to fetch history to test connection
            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    localStorage.removeItem('penak_pending_sync');
                    document.getElementById('sync-status').classList.add('hidden');
                    showNotification("✅ همگام‌سازی موفق!", "success");
                })
                .catch(err => {
                    showNotification("❌ خطا در اتصال", "error");
                });
        }

        // Player Management Functions
        function loadPlayers() {
            const saved = localStorage.getItem('penak_players');
            if(saved) {
                savedPlayers = JSON.parse(saved);
            }
        }

        function savePlayers() {
            localStorage.setItem('penak_players', JSON.stringify(savedPlayers));
        }

        function loadPlaces() {
            const saved = localStorage.getItem('penak_places');
            if(saved) {
                savedPlaces = JSON.parse(saved);
            }
        }

        function savePlaces() {
            localStorage.setItem('penak_places', JSON.stringify(savedPlaces));
        }

        function addPlace(place) {
            if(!place || place.trim() === '') return;
            place = place.trim();
            
            // Remove if already exists (to move to front)
            const index = savedPlaces.indexOf(place);
            if(index > -1) {
                savedPlaces.splice(index, 1);
            }
            
            // Add to front
            savedPlaces.unshift(place);
            
            // Keep only last 20
            if(savedPlaces.length > 20) {
                savedPlaces = savedPlaces.slice(0, 20);
            }
            
            savePlaces();
            updatePlaceDatalist();
        }

        function loadHistoryToExtractData() {
            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    if(data.error || data.length === 0) return;
                    
                    // Extract all unique players and places from history
                    const playersSet = new Set(savedPlayers);
                    const placesSet = new Set(savedPlaces);
                    
                    data.forEach(match => {
                        // Add place
                        if(match.place) {
                            placesSet.add(match.place);
                        }
                        
                        // Add players from both teams
                        if(match.teamA && match.teamA.players) {
                            match.teamA.players.split(',').forEach(p => {
                                const player = p.trim();
                                if(player) playersSet.add(player);
                            });
                        }
                        
                        if(match.teamB && match.teamB.players) {
                            match.teamB.players.split(',').forEach(p => {
                                const player = p.trim();
                                if(player) playersSet.add(player);
                            });
                        }
                    });
                    
                    // Update saved players and places
                    savedPlayers = Array.from(playersSet);
                    savedPlaces = Array.from(placesSet);
                    
                    savePlayers();
                    savePlaces();
                    renderSavedPlayers();
                    renderSavedPlaces();
                })
                .catch(err => {
                    console.log('Could not load history data:', err);
                });
        }

        function renderSavedPlayers() {
            const container = document.getElementById('saved-players');
            container.innerHTML = '';
            
            if(savedPlayers.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center text-gray-400 text-xs py-4">هنوز بازیکنی ثبت نشده</div>';
                return;
            }
            
            savedPlayers.forEach(player => {
                const isSelectedA = selectedPlayers.teamA.includes(player);
                const isSelectedB = selectedPlayers.teamB.includes(player);
                
                const div = document.createElement('div');
                div.className = `player-option touch-btn p-3 rounded-lg border-2 text-center text-sm font-bold relative ${
                    isSelectedA ? 'border-blue-500 bg-blue-600 text-white' : 
                    isSelectedB ? 'border-red-500 bg-red-600 text-white' : 
                    'border-gray-200 bg-white text-gray-700'
                }`;
                
                // Add team indicator icon
                let teamIcon = '';
                if(isSelectedA) {
                    teamIcon = '<span class="absolute top-1 right-1 text-xs">🔵</span>';
                } else if(isSelectedB) {
                    teamIcon = '<span class="absolute top-1 right-1 text-xs">🔴</span>';
                }
                
                div.innerHTML = teamIcon + player;
                div.onclick = () => togglePlayerSelection(player);
                container.appendChild(div);
            });
        }

        function togglePlayerSelection(player) {
            const isInA = selectedPlayers.teamA.includes(player);
            const isInB = selectedPlayers.teamB.includes(player);
            
            if(!isInA && !isInB) {
                // Not selected -> Add to Team A
                selectedPlayers.teamA.push(player);
            } else if(isInA) {
                // In Team A -> Move to Team B
                selectedPlayers.teamA = selectedPlayers.teamA.filter(p => p !== player);
                selectedPlayers.teamB.push(player);
            } else if(isInB) {
                // In Team B -> Unselect
                selectedPlayers.teamB = selectedPlayers.teamB.filter(p => p !== player);
            }
            
            renderSavedPlayers();
            updateTeamDisplays();
        }

        // Game Functions
        function startGame() {
            let place = document.getElementById('place').value.trim();
            
            // If custom input is shown and has value, use it
            if(document.getElementById('custom-place-container').classList.contains('hidden') === false && place) {
                // Add the new place to saved places
                addPlace(place);
            }
            
            if(!place) {
                showNotification("⚠️ لطفاً مکان بازی را انتخاب یا وارد کنید", "warning");
                return;
            }
            
            if(selectedPlayers.teamA.length === 0 || selectedPlayers.teamB.length === 0) {
                showNotification("⚠️ لطفاً بازیکنان هر دو تیم را انتخاب کنید", "warning");
                return;
            }

            const now = new Date();
            
            // Fix: Use manual formatting to avoid timezone issues
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            gameState.date = `${year}/${month}/${day}`;
            gameState.time = `${hours}:${minutes}`;
            
            gameState.place = place;
            gameState.teamA.players = [...selectedPlayers.teamA];
            gameState.teamB.players = [...selectedPlayers.teamB];
            gameState.active = true;
            gameState.target = 204;
            gameState.teamA.score = 0;
            gameState.teamB.score = 0;
            gameState.teamA.history = [];
            gameState.teamB.history = [];
            gameState.winner = null;

            document.getElementById('display-date').innerText = gameState.date + " " + gameState.time;
            document.getElementById('display-place').innerText = "📍 " + gameState.place;
            document.getElementById('disp-nameA').innerText = selectedPlayers.teamA.join(', ');
            document.getElementById('disp-nameB').innerText = selectedPlayers.teamB.join(', ');
            
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            
            resetVisuals();
            showNotification("✅ بازی شروع شد", "success");
        }

        function quickScore(team, points) {
            if(!gameState.active) return;
            
            gameState[`team${team}`].score += points;
            gameState[`team${team}`].history.push(points);

            const scoreElement = document.getElementById(`score${team}`);
            scoreElement.innerText = gameState[`team${team}`].score;
            scoreElement.classList.add('score-update');
            setTimeout(() => scoreElement.classList.remove('score-update'), 400);

            updateLogs();
            checkWinCondition();
        }

        function addScore(team) {
            if(!gameState.active) return;
            const inputId = team === 'A' ? 'addA' : 'addB';
            const input = document.getElementById(inputId);
            const val = parseInt(input.value);

            if(isNaN(val) || val === 0) { 
                showNotification("⚠️ لطفاً عدد معتبر وارد کنید", "warning");
                return; 
            }

            gameState[`team${team}`].score += val;
            gameState[`team${team}`].history.push(val);
            input.value = "";

            const scoreElement = document.getElementById(`score${team}`);
            scoreElement.innerText = gameState[`team${team}`].score;
            scoreElement.classList.add('score-update');
            setTimeout(() => scoreElement.classList.remove('score-update'), 400);

            updateLogs();
            checkWinCondition();
        }

        function undoScore(team) {
            const history = gameState[`team${team}`].history;
            if(history.length === 0) {
                showNotification("⚠️ هیچ دستی وجود ندارد", "warning");
                return;
            }
            
            const lastVal = history.pop();
            gameState[`team${team}`].score -= lastVal;
            if(gameState[`team${team}`].score < 0) gameState[`team${team}`].score = 0;

            document.getElementById(`score${team}`).innerText = gameState[`team${team}`].score;
            updateLogs();
            
            if(gameState.winner) {
                gameState.winner = null;
                document.getElementById('finish-btn').classList.add('hidden');
                document.getElementById('status-bar').innerText = "🎯 هدف: " + gameState.target;
                document.getElementById('status-bar').className = "bg-gradient-to-r from-yellow-100 to-yellow-200 text-center py-3 text-yellow-900 font-bold border-b";
                document.getElementById('card-a').classList.remove('winner-glow');
                document.getElementById('card-b').classList.remove('winner-glow');
            }
            
            showNotification("↩️ حذف شد", "info");
        }

        function updateLogs() {
            ['A', 'B'].forEach(team => {
                const log = document.getElementById(`log-${team.toLowerCase()}`);
                log.innerHTML = '';
                
                if(gameState[`team${team}`].history.length === 0) {
                    log.innerHTML = '<div class="text-gray-300 italic text-xs">خالی</div>';
                } else {
                    gameState[`team${team}`].history.forEach((score, idx) => {
                        const colorClass = team === 'A' ? 'text-blue-800' : 'text-red-800';
                        const sign = score > 0 ? '+' : ''; 
                        log.innerHTML += `<div class="log-item ${colorClass}"><span class="text-gray-400 text-xs">#${idx + 1}</span> ${sign}${score}</div>`;
                    });
                    log.scrollTop = log.scrollHeight;
                }
            });
        }

        function resetVisuals() {
            document.getElementById('scoreA').innerText = "0";
            document.getElementById('scoreB').innerText = "0";
            document.getElementById('status-bar').innerText = "🎯 هدف: 204";
            document.getElementById('status-bar').className = "bg-gradient-to-r from-yellow-100 to-yellow-200 text-center py-3 text-yellow-900 font-bold border-b";
            document.getElementById('card-a').classList.remove('winner-glow');
            document.getElementById('card-b').classList.remove('winner-glow');
            document.getElementById('finish-btn').classList.add('hidden');
            updateLogs();
        }

        function checkWinCondition() {
            const sA = gameState.teamA.score;
            const sB = gameState.teamB.score;
            const target = gameState.target;
            const statusBar = document.getElementById('status-bar');

            let winner = null;
            let loser = null;

            if (sA >= target) { winner = 'A'; loser = 'B'; }
            else if (sB >= target) { winner = 'B'; loser = 'A'; }

            if (winner) {
                const loserScore = gameState[`team${loser}`].score;
                let gameFinished = false;
                let message = "";

                if (target === 204) {
                    if (loserScore >= 200) {
                        gameState.target = 306;
                        message = "⚠️ هدف جدید: 306";
                        statusBar.className = "bg-gradient-to-r from-orange-100 to-orange-200 text-center py-3 text-orange-900 font-bold border-b";
                        showNotification(message, "warning");
                    } else { gameFinished = true; }
                } else if (target === 306) {
                    if (loserScore >= 300) {
                        gameState.target = 408;
                        message = "⚠️ هدف جدید: 408";
                        statusBar.className = "bg-gradient-to-r from-purple-100 to-purple-200 text-center py-3 text-purple-900 font-bold border-b";
                        showNotification(message, "warning");
                    } else { gameFinished = true; }
                } else if (target === 408) {
                    gameFinished = true;
                }

                if (gameFinished) {
                    gameState.winner = gameState[`team${winner}`].players.join(', ');
                    statusBar.innerText = "🏆 برنده: " + (winner === 'A' ? 'تیم آبی' : 'تیم قرمز');
                    statusBar.className = "bg-gradient-to-r from-green-400 to-green-500 text-center py-3 text-white font-bold border-b";
                    document.getElementById(`card-${winner.toLowerCase()}`).classList.add('winner-glow');
                    document.getElementById('finish-btn').classList.remove('hidden');
                    showNotification("🎉 بازی تمام شد!", "success");
                } else {
                    statusBar.innerText = message;
                }
            }
        }

        function saveGameNow() {
            closeSummary();
            
            const btn = document.getElementById('finish-btn');
            btn.innerText = "در حال ذخیره...";
            btn.disabled = true;

            const data = {
                date: gameState.date, 
                time: gameState.time, 
                place: gameState.place,
                teamA: {
                    name: "تیم A",
                    players: gameState.teamA.players.join(', '),
                    score: gameState.teamA.score,
                    history: gameState.teamA.history
                },
                teamB: {
                    name: "تیم B",
                    players: gameState.teamB.players.join(', '),
                    score: gameState.teamB.score,
                    history: gameState.teamB.history
                },
                winner: gameState.winner
            };

            // Send data to Google Script
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(data)
            });

            // Mark as syncing
            localStorage.setItem('penak_pending_sync', 'true');

            // Since we use no-cors, we can't wait for response
            setTimeout(() => {
                // Mark as synced (optimistic)
                localStorage.removeItem('penak_pending_sync');
                showNotification("✅ بازی ذخیره شد!", "success");
                
                // Show home button
                btn.innerText = "🏠 بازگشت به خانه";
                btn.disabled = false;
                btn.onclick = goHome;
            }, 500);

        function loadHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '<div class="text-center text-gray-500 py-6 text-sm">⏳ در حال بارگذاری...</div>';

            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    list.innerHTML = ""; 
                    
                    if(data.error || data.length === 0) {
                        list.innerHTML = '<div class="text-center text-gray-400 py-10"><div class="text-5xl mb-3">📭</div><p class="text-sm">خالی</p></div>';
                        return;
                    }

                    data.reverse().forEach((match, index) => {
                        const isTeamAWinner = match.winner && match.winner.includes(match.teamA.players.split(',')[0]);
                        
                        // Use the date and time as-is from the data (already saved correctly)
                        const displayDate = match.date || '';
                        const displayTime = match.time || '';
                        
                        const card = `
                            <div class="bg-white p-4 rounded-xl border-2 border-gray-100 shadow-sm slide-up" style="animation-delay: ${index * 0.05}s">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="text-xs text-gray-400">
                                        ${displayDate} • ${displayTime}
                                        <div class="text-gray-600 mt-1">📍 ${match.place}</div>
                                    </div>
                                    <div class="text-xl">🃏</div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="p-3 rounded-lg border-2 ${isTeamAWinner ? 'border-green-400 bg-green-50' : 'border-gray-200 bg-gray-50'}">
                                        <div class="flex justify-between items-start mb-1">
                                            <div class="text-xs font-bold ${isTeamAWinner ? 'text-green-800' : 'text-gray-600'}">
                                                ${match.teamA.players}
                                            </div>
                                            ${isTeamAWinner ? '<span class="text-lg">🏆</span>' : ''}
                                        </div>
                                        <div class="text-3xl font-bold ${isTeamAWinner ? 'text-green-600' : 'text-gray-400'}">${match.teamA.score}</div>
                                    </div>
                                    
                                    <div class="p-3 rounded-lg border-2 ${!isTeamAWinner ? 'border-green-400 bg-green-50' : 'border-gray-200 bg-gray-50'}">
                                        <div class="flex justify-between items-start mb-1">
                                            <div class="text-xs font-bold ${!isTeamAWinner ? 'text-green-800' : 'text-gray-600'}">
                                                ${match.teamB.players}
                                            </div>
                                            ${!isTeamAWinner ? '<span class="text-lg">🏆</span>' : ''}
                                        </div>
                                        <div class="text-3xl font-bold ${!isTeamAWinner ? 'text-green-600' : 'text-gray-400'}">${match.teamB.score}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                        list.innerHTML += card;
                    });
                })
                .catch(err => {
                    list.innerHTML = `<div class="text-center text-red-500 p-4 border rounded bg-red-50 text-sm">❌ ${err.message}</div>`;
                });
        }

        function calculateStats() {
            const content = document.getElementById('stats-content');
            content.innerHTML = '<div class="text-center text-gray-500 py-6 text-sm">⏳ محاسبه...</div>';

            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    if(data.error || data.length === 0) {
                        content.innerHTML = '<div class="text-center text-gray-400 py-10"><div class="text-5xl mb-3">📊</div><p class="text-sm">داده‌ای موجود نیست</p></div>';
                        return;
                    }

                    // Simple calculation - only basic stats
                    const playerStats = {};

                    data.forEach(match => {
                        [match.teamA, match.teamB].forEach(team => {
                            const isWinner = match.winner && match.winner.includes(team.players.split(',')[0]);
                            team.players.split(',').forEach(p => {
                                const player = p.trim();
                                if(!player) return;
                                if(!playerStats[player]) {
                                    playerStats[player] = { wins: 0, losses: 0, totalScore: 0, games: 0 };
                                }
                                if(isWinner) playerStats[player].wins++;
                                else playerStats[player].losses++;
                                playerStats[player].totalScore += team.score;
                                playerStats[player].games++;
                            });
                        });
                    });

                    // Simple ranking
                    const sortedPlayers = Object.entries(playerStats)
                        .map(([name, stats]) => {
                            const winRate = stats.wins / stats.games;
                            const experienceWeight = Math.min(stats.games, 10) / 10;
                            const rankingScore = winRate * experienceWeight;
                            return [name, stats, rankingScore];
                        })
                        .sort((a, b) => {
                            if(b[2] !== a[2]) return b[2] - a[2];
                            return b[1].games - a[1].games;
                        });

                    let html = `
                        <div class="bg-white p-4 rounded-xl shadow-lg border-2 border-purple-100 mb-4">
                            <h3 class="text-lg font-bold text-purple-800 mb-3 flex items-center gap-2">
                                👑 رتبه‌بندی بازیکنان
                            </h3>
                            <div class="text-xs text-gray-500 mb-3 bg-blue-50 p-2 rounded">
                                💡 رتبه‌بندی بر اساس ترکیب درصد برد و تجربه (حداقل 10 بازی برای امتیاز کامل)
                            </div>
                            <div class="space-y-2">
                                ${sortedPlayers.map(([name, stats, rankingScore], idx) => {
                                    const winRate = ((stats.wins / stats.games) * 100).toFixed(0);
                                    const avgScore = (stats.totalScore / stats.games).toFixed(0);
                                    const experienceLevel = stats.games >= 10 ? '⭐' : stats.games >= 5 ? '📈' : '🆕';
                                    
                                    return `
                                        <div class="flex items-center gap-3 p-3 rounded-lg bg-gradient-to-r from-purple-50 to-white border border-purple-100">
                                            <div class="text-lg font-bold text-purple-600 w-6">#${idx + 1}</div>
                                            <div class="flex-1">
                                                <div class="font-bold text-sm flex items-center gap-1">
                                                    ${name} ${experienceLevel}
                                                </div>
                                                <div class="text-xs text-gray-600">
                                                    ${stats.games} بازی • ${stats.wins}W-${stats.losses}L
                                                </div>
                                            </div>
                                            <div class="text-right">
                                                <div class="text-xl font-bold text-green-600">${winRate}%</div>
                                                <div class="text-xs text-gray-500">~${avgScore}</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-gradient-to-br from-blue-500 to-blue-600 p-4 rounded-xl text-white text-center">
                                <div class="text-3xl font-bold">${data.length}</div>
                                <div class="text-xs mt-1">بازی</div>
                            </div>
                            <div class="bg-gradient-to-br from-purple-500 to-purple-600 p-4 rounded-xl text-white text-center">
                                <div class="text-3xl font-bold">${Object.keys(playerStats).length}</div>
                                <div class="text-xs mt-1">بازیکن</div>
                            </div>
                            <div class="bg-gradient-to-br from-green-500 to-green-600 p-4 rounded-xl text-white text-center">
                                <div class="text-2xl font-bold">${sortedPlayers[0] ? sortedPlayers[0][0] : '-'}</div>
                                <div class="text-xs mt-1">برتر</div>
                            </div>
                        </div>
                    `;

                    content.innerHTML = html;
                })
                .catch(err => {
                    content.innerHTML = `<div class="text-center text-red-500 p-4 border rounded bg-red-50 text-sm">❌ خطا: ${err.message}</div>`;
                });
        }

        // Notification System
        function showNotification(message, type = 'info') {
            const colors = {
                success: 'from-green-500 to-green-600',
                error: 'from-red-500 to-red-600',
                warning: 'from-yellow-500 to-yellow-600',
                info: 'from-blue-500 to-blue-600'
            };

            const notification = document.createElement('div');
            notification.className = `fixed top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r ${colors[type]} text-white px-5 py-3 rounded-xl shadow-2xl z-50 text-sm font-bold max-w-xs`;
            notification.style.cssText = 'animation: slideDown 0.3s ease-out';
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 2500);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100px); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

     <script>
    // ============================================
    // PWA SERVICE WORKER REGISTRATION (GitHub Pages)
    // ============================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/penak/service-worker.js')
                .then((registration) => {
                    console.log('✅ Service Worker registered:', registration);
                    
                    // Check for updates
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if (confirm('نسخه جدید موجود است! می‌خواهید به‌روزرسانی کنید؟')) {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                }
                            }
                        });
                    });
                })
                .catch((error) => {
                    console.log('❌ Service Worker registration failed:', error);
                });
        });
    }

    // ============================================
    // PWA INSTALL PROMPT
    // ============================================
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        setTimeout(() => {
            showInstallPrompt();
        }, 5000);
    });

    function showInstallPrompt() {
        if (!deferredPrompt) return;
        if (window.matchMedia('(display-mode: standalone)').matches) return;

        const installBanner = document.createElement('div');
        installBanner.className = 'fixed bottom-20 left-4 right-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl shadow-2xl z-50 animate-slideUp';
        installBanner.innerHTML = `
            <div class="flex items-center justify-between gap-3">
                <div class="flex-1">
                    <div class="font-bold mb-1">📱 نصب برنامه</div>
                    <div class="text-xs opacity-90">برای دسترسی آسان‌تر، برنامه را نصب کنید</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="dismissInstall()" class="touch-btn bg-white bg-opacity-20 px-3 py-2 rounded-lg text-xs font-bold">
                        بعداً
                    </button>
                    <button onclick="installApp()" class="touch-btn bg-white text-blue-600 px-4 py-2 rounded-lg text-xs font-bold">
                        نصب
                    </button>
                </div>
            </div>
        `;
        installBanner.id = 'install-banner';
        document.body.appendChild(installBanner);
    }

    window.installApp = async function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;

        if (outcome === 'accepted') {
            console.log('✅ User accepted the install prompt');
            showNotification("✅ برنامه در حال نصب است...", "success");
        }

        deferredPrompt = null;
        const banner = document.getElementById('install-banner');
        if (banner) banner.remove();
    };

    window.dismissInstall = function() {
        const banner = document.getElementById('install-banner');
        if (banner) banner.remove();
        localStorage.setItem('install_dismissed', Date.now() + (7 * 24 * 60 * 60 * 1000));
    };

    window.addEventListener('appinstalled', () => {
        console.log('✅ PWA installed successfully!');
        showNotification("✅ برنامه با موفقیت نصب شد!", "success");
        deferredPrompt = null;
    });

    if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('✅ Running as installed PWA');
    }
</script>
</body>
</html>
